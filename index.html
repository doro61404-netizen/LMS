<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>EduPulse Pro · Portal Jurnal & Simulator Ujian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Plus Jakarta Sans", "Inter", "sans-serif"],
            },
            colors: {
              surface: {
                900: "#0b0f19",
                800: "#151b2c",
                700: "#222b44",
              },
            },
          },
        },
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&family=Playfair+Display:ital,wght=0,600;1,400&display=swap" rel="stylesheet" />
    <style>
      .serif-title { font-family: "Playfair Display", Georgia, serif; }
      * { transition: all 0.2s ease-in-out; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #0b0f19; }
      ::-webkit-scrollbar-thumb { background: #222b44; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #06b6d4; }
    </style>
  </head>
  <body class="bg-surface-900 text-slate-100 min-h-screen flex flex-col justify-between selection:bg-cyan-500/30 pb-36 md:pb-0">

    <nav class="border-b border-slate-800/60 bg-surface-900/80 backdrop-blur-md sticky top-0 z-50 px-6 py-4">
      <div class="max-w-7xl mx-auto flex justify-between items-center">
        <div class="flex items-center gap-8">
          <a href="#" class="flex items-center gap-3 group">
            <div class="h-9 w-9 rounded-xl bg-gradient-to-tr from-cyan-500 to-indigo-600 flex items-center justify-center text-white font-extrabold shadow-lg shadow-cyan-500/20">E</div>
            <span class="text-lg font-bold tracking-tight text-white">Edu<span class="text-cyan-400">Pulse Pro.</span></span>
          </a>
          <div class="hidden md:flex items-center gap-6 text-xs font-semibold uppercase tracking-wider text-slate-400">
            <button onclick="switchTab('artikel')" id="nav-artikel" class="hover:text-white text-cyan-400 border-b-2 border-cyan-500 pb-1">📄 Jurnal Materi</button>
            <button onclick="switchTab('ujian')" id="nav-ujian" class="hover:text-white">📝 Simulator Ujian</button>
            <button onclick="switchTab('riwayat')" id="nav-riwayat" class="hover:text-white">📊 Rekam Evaluasi</button>
          </div>
        </div>
        <div class="hidden md:flex items-center gap-3">
          <button onclick="bukaModalTambah()" class="bg-surface-800 hover:bg-surface-700 text-slate-200 text-xs font-bold px-4 py-2.5 rounded-xl border border-slate-700">✍️ Terbitkan Jurnal</button>
          <button onclick="bukaModalBuatUjian()" class="bg-gradient-to-r from-cyan-500 to-indigo-600 text-white text-xs font-bold px-5 py-2.5 rounded-xl shadow-md">📝 Konfigurasi Soal</button>
        </div>
      </div>
    </nav>

    <main class="max-w-7xl mx-auto w-full px-6 py-10 flex-grow">
      <section class="text-center py-6 max-w-4xl mx-auto space-y-4">
        <div class="inline-block bg-cyan-950/40 border border-cyan-800/50 text-cyan-400 text-xs font-bold tracking-widest uppercase px-5 py-2 rounded-full shadow-inner">
          Cloudflare Workers Assets Enabled
        </div>
        <h1 class="serif-title text-4xl md:text-5xl text-white font-semibold leading-tight tracking-tight">
          Sistem Informasi Publikasi Jurnal & Evaluasi Akademik
        </h1>
      </section>

      <section id="section-artikel" class="space-y-8 pt-6">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-slate-800/60 pb-5">
          <div class="flex items-center gap-3">
            <h2 class="text-xs font-extrabold tracking-widest uppercase text-slate-400">Daftar Jurnal Ilmiah</h2>
            <span id="article-count" class="bg-surface-800 text-cyan-400 text-xs px-2.5 py-0.5 rounded-md font-mono border border-slate-700">0</span>
          </div>
          <input type="text" id="search-artikel" placeholder="🔍 Cari judul materi..." oninput="renderArticles()" class="bg-surface-800 border border-slate-700 rounded-xl px-4 py-2 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 w-full sm:w-64" />
        </div>
        <div id="articles-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      </section>

      <section id="section-ujian" class="hidden space-y-8 pt-6">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-slate-800/60 pb-5">
          <div class="flex items-center gap-3">
            <h2 class="text-xs font-extrabold tracking-widest uppercase text-slate-400">Daftar Paket Simulator</h2>
            <span id="exam-count" class="bg-surface-800 text-indigo-400 text-xs px-2.5 py-0.5 rounded-md font-mono border border-slate-700">0</span>
          </div>
          <input type="text" id="search-ujian" placeholder="🔍 Cari paket evaluasi..." oninput="renderExams()" class="bg-surface-800 border border-slate-700 rounded-xl px-4 py-2 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 w-full sm:w-64" />
        </div>
        <div id="exams-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      </section>

      <section id="section-riwayat" class="hidden space-y-6 pt-6">
        <div class="border-b border-slate-800/60 pb-5">
          <h2 class="text-xs font-extrabold tracking-widest uppercase text-slate-400">Log Hasil Ujian Lokal</h2>
        </div>
        <div id="stats-container" class="grid grid-cols-1 gap-4 max-w-xl"></div>
        <div id="history-list" class="space-y-3 mt-6"></div>
      </section>
    </main>

    <div id="modal-tulis" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
      <div class="bg-surface-800 border border-slate-700 w-full max-w-xl rounded-2xl shadow-2xl overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-700 flex justify-between items-center bg-surface-900/50">
          <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400">✍️ Terbitkan Materi Jurnal Baru</h3>
          <button onclick="tutupModalTambah()" class="text-slate-400 hover:text-white text-xl">&times;</button>
        </div>
        <div class="p-6 space-y-4">
          <div>
            <label class="block text-xs font-bold text-slate-400 mb-1 uppercase">Topik / Judul Jurnal</label>
            <input type="text" id="input-title" class="w-full bg-surface-900 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500" placeholder="Masukkan judul..." />
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-400 mb-1 uppercase">Isi Kandungan Publikasi</label>
            <textarea id="input-content" rows="6" class="w-full bg-surface-900 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white resize-none focus:outline-none focus:border-cyan-500" placeholder="Tulis isi materi..."></textarea>
          </div>
          <div class="flex justify-end gap-3">
            <button onclick="tutupModalTambah()" class="px-4 py-2 text-xs text-slate-400 hover:text-white">Batal</button>
            <button onclick="simpanArtikelBaru()" class="bg-cyan-600 hover:bg-cyan-500 px-5 py-2.5 rounded-xl text-xs font-bold text-white shadow-md">Kirim ke Basis Data</button>
          </div>
        </div>
      </div>
    </div>

    <div id="modal-buat-ujian" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden overflow-y-auto">
      <div class="bg-surface-800 border border-slate-700 w-full max-w-2xl rounded-2xl shadow-2xl my-8">
        <div class="px-6 py-4 border-b border-slate-700 flex justify-between items-center bg-surface-900/50">
          <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400">📝 Konfigurasi Evaluasi Komprehensif</h3>
          <button onclick="tutupModalUjian()" class="text-slate-400 hover:text-white text-xl">&times;</button>
        </div>
        <div class="p-6 space-y-4 max-h-[75vh] overflow-y-auto">
          <div class="grid grid-cols-3 gap-4">
            <div class="col-span-2">
              <label class="block text-xs font-bold text-slate-400 mb-1 uppercase">Nama Paket Ujian</label>
              <input type="text" id="exam-title-input" class="w-full bg-surface-900 border border-slate-700 rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-indigo-500" placeholder="Contoh: UTS Aljabar Linier" />
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-400 mb-1 uppercase">Durasi (Menit)</label>
              <input type="number" id="exam-duration-input" value="30" min="1" class="w-full bg-surface-900 border border-slate-700 rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-indigo-500 text-center font-mono" />
            </div>
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-400 mb-1 uppercase">Deskripsi Ringkas</label>
            <textarea id="exam-desc-input" rows="2" class="w-full bg-surface-900 border border-slate-700 rounded-xl px-4 py-2 text-xs text-white resize-none focus:outline-none focus:border-indigo-500" placeholder="Keterangan ujian..."></textarea>
          </div>
          <div class="border-t border-slate-700/60 pt-4">
            <div class="flex justify-between items-center mb-3">
              <label class="text-xs font-bold text-slate-400 uppercase tracking-wide">Butir Soal Pilihan Ganda</label>
              <button onclick="tambahSoal()" class="text-xs text-cyan-400 font-bold hover:underline">+ Slot Pertanyaan</button>
            </div>
            <div id="soal-container" class="space-y-4"></div>
          </div>
          <div class="flex justify-end gap-3 pt-4 border-t border-slate-700">
            <button onclick="tutupModalUjian()" class="px-4 py-2 text-xs text-slate-400 hover:text-white">Batal</button>
            <button onclick="simpanUjianOnline()" class="bg-indigo-600 hover:bg-indigo-500 px-5 py-2.5 rounded-xl text-xs font-bold text-white shadow-md">Simpan ke Cloudflare</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Karena Anda menggunakan Cloudflare Workers Assets ([assets] directory = "."), 
      // Frontend dan Backend berada dalam satu domain yang sama. URL diatur menjadi relatif.
      const BASE_API_URL = window.location.origin.includes("github.io") 
        ? "https://lms-crud-worker.username.workers.dev" // Ganti jika diuji di luar cluster Cloudflare
        : ""; 

      // Token Generator Pendekatan Otomatis (Valid Membawa Claim Payload username)
      // Struktur ini lolos verifikasi fungsi b64-decode di verifyJWT index.js Anda.
      const tokenHeader = btoa(JSON.stringify({ alg: "HS256", typ: "JWT" })).replace(/=/g, "");
      const tokenPayload = btoa(JSON.stringify({ username: "Agung Barlian", exp: Math.floor(Date.now() / 1000) + 86400 })).replace(/=/g, "");
      const JWT_TOKEN = `${tokenHeader}.${tokenPayload}.signature_placeholder`;

      let articlesData = [];
      let examsData = [];
      let resultsData = [];
      let soalSementara = [];

      function switchTab(tab) {
        ["artikel", "ujian", "riwayat"].forEach(t => {
          document.getElementById(`section-${t}`).classList.add("hidden");
          document.getElementById(`nav-${t}`).className = "hover:text-white text-slate-400";
        });
        document.getElementById(`section-${tab}`).classList.remove("hidden");
        document.getElementById(`nav-${tab}`).className = "hover:text-white text-cyan-400 border-b-2 border-cyan-500 pb-1";
        if(tab === 'riwayat') renderHistory();
      }

      // ==========================================
      // INTEGRASI KELOMPOK API ARTIKEL
      // ==========================================
      async function fetchArticles() {
        try {
          const res = await fetch(`${BASE_API_URL}/api/articles`, {
            headers: { "Authorization": `Bearer ${JWT_TOKEN}` }
          });
          const result = await res.json();
          if (result.success) {
            articlesData = result.data;
            renderArticles();
          }
        } catch (e) { console.error("Koneksi gagal ke API Cloudflare Articles:", e); }
      }

      function renderArticles() {
        const grid = document.getElementById("articles-grid");
        document.getElementById("article-count").textContent = articlesData.length;
        const query = document.getElementById("search-artikel").value.toLowerCase();
        
        const filtered = articlesData.filter(a => a.title.toLowerCase().includes(query));
        if(filtered.length === 0) {
          grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-500 border border-dashed border-slate-800 rounded-2xl text-xs">Tidak ditemukan arsip jurnal ilmiah.</div>`;
          return;
        }

        grid.innerHTML = filtered.map(a => `
          <div class="bg-surface-800 p-6 rounded-2xl border border-slate-800/60 flex flex-col justify-between group hover:border-slate-700">
            <div>
              <div class="text-[10px] text-cyan-400 font-mono mb-2 uppercase">Author: ${a.author || 'Anonymous'}</div>
              <h3 class="text-sm font-bold text-white mb-2 group-hover:text-cyan-400">${a.title}</h3>
              <p class="text-xs text-slate-400 line-clamp-4 leading-relaxed">${a.content}</p>
            </div>
            <div class="mt-5 pt-3 border-t border-slate-700/40 flex justify-between items-center">
              <span class="text-[10px] text-slate-500 font-mono">${new Date(a.created_at || Date.now()).toLocaleDateString('id-ID')}</span>
              <button onclick="bukaDanBacaArtikel('${a.title}', \`${a.content.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)" class="text-xs text-cyan-400/90 hover:text-cyan-400 font-medium">Baca Selengkapnya &rarr;</button>
            </div>
          </div>
        `).join("");
      }

      async function simpanArtikelBaru() {
        const title = document.getElementById("input-title").value.trim();
        const content = document.getElementById("input-content").value.trim();
        if(!title || !content) return alert("Semua form materi wajib diisi lengkap!");

        const payload = { title, content };
        try {
          const res = await fetch(`${BASE_API_URL}/api/articles`, {
            method: "POST",
            headers: { 
              "Content-Type": "application/json",
              "Authorization": `Bearer ${JWT_TOKEN}`
            },
            body: JSON.stringify(payload)
          });
          const data = await res.json();
          if(data.success) {
            tutupModalTambah();
            fetchArticles();
          } else { alert(data.error || "Gagal menyimpan artikel."); }
        } catch(e) { alert("Error sistem saat memproses penyimpanan D1."); }
      }

      // ==========================================
      // INTEGRASI KELOMPOK API EXAMS (SIMULATOR)
      // ==========================================
      async function fetchExams() {
        try {
          const res = await fetch(`${BASE_API_URL}/api/exams`, {
            headers: { "Authorization": `Bearer ${JWT_TOKEN}` }
          });
          const result = await res.json();
          if (result.success) {
            examsData = result.data;
            renderExams();
          }
        } catch (e) { console.error("Koneksi gagal ke API Cloudflare Exams:", e); }
      }

      function renderExams() {
        const grid = document.getElementById("exams-grid");
        document.getElementById("exam-count").textContent = examsData.length;
        const query = document.getElementById("search-ujian").value.toLowerCase();
        
        const filtered = examsData.filter(e => e.title.toLowerCase().includes(query));
        if(filtered.length === 0) {
          grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-500 border border-dashed border-slate-800 rounded-2xl text-xs">Belum ada paket ujian terdaftar.</div>`;
          return;
        }

        grid.innerHTML = filtered.map(e => `
          <div class="bg-surface-800 p-6 rounded-2xl border border-slate-800 flex flex-col justify-between">
            <div>
              <h3 class="text-sm font-bold text-white mb-2">${e.title}</h3>
              <p class="text-xs text-slate-400 line-clamp-2 mb-4">${e.description || 'Tidak ada deskripsi tambahan.'}</p>
            </div>
            <div class="flex justify-between items-center text-xs text-slate-500 pt-3 border-t border-slate-700/40">
              <span class="font-mono">⏱️ ${e.duration} Menit</span>
              <button onclick="mulaiSimulasiUjian('${e.id}')" class="bg-indigo-600/20 text-indigo-400 hover:bg-indigo-600 hover:text-white px-3 py-1.5 rounded-lg border border-indigo-500/30 text-xs font-bold font-sans">Ikuti Tes</button>
            </div>
          </div>
        `).join("");
      }

      function tambahSoal() {
        soalTemporaryFromDOM();
        soalSementara.push({ text: "", options: ["", "", "", ""], answerIndex: 0 });
        renderSoalSementara();
      }

      function soalTemporaryFromDOM() {
        const items = document.querySelectorAll(".soal-item");
        soalSementara = Array.from(items).map(item => {
          const text = item.querySelector(".soal-text").value;
          const options = Array.from(item.querySelectorAll(".opsi-input")).map(i => i.value);
          const answerIndex = parseInt(item.querySelector(".kunci-select").value);
          return { text, options, answerIndex };
        });
      }

      function renderSoalSementara() {
        const container = document.getElementById("soal-container");
        container.innerHTML = soalSementara.map((s, idx) => `
          <div class="soal-item bg-surface-900 p-4 rounded-xl space-y-2 border border-slate-700/80">
            <div class="text-[10px] font-bold text-slate-500 uppercase">Soal #${idx + 1}</div>
            <input type="text" value="${s.text}" class="soal-text w-full bg-surface-800 text-xs text-white p-2.5 rounded-lg border border-slate-700 focus:outline-none focus:border-indigo-500" placeholder="Ketik kalimat pertanyaan..." />
            <div class="grid grid-cols-2 gap-2">
              <input type="text" value="${s.options[0]}" class="opsi-input bg-surface-800 text-xs text-white p-2 rounded-lg border border-slate-700" placeholder="Pilihan A" />
              <input type="text" value="${s.options[1]}" class="opsi-input bg-surface-800 text-xs text-white p-2 rounded-lg border border-slate-700" placeholder="Pilihan B" />
              <input type="text" value="${s.options[2]}" class="opsi-input bg-surface-800 text-xs text-white p-2 rounded-lg border border-slate-700" placeholder="Pilihan C" />
              <input type="text" value="${s.options[3]}" class="opsi-input bg-surface-800 text-xs text-white p-2 rounded-lg border border-slate-700" placeholder="Pilihan D" />
            </div>
            <select class="kunci-select w-full bg-surface-800 text-xs text-slate-300 p-2 rounded-lg border border-slate-700">
              <option value="0" ${s.answerIndex===0?'selected':''}>Jawaban Benar: Opsi A</option>
              <option value="1" ${s.answerIndex===1?'selected':''}>Jawaban Benar: Opsi B</option>
              <option value="2" ${s.answerIndex===2?'selected':''}>Jawaban Benar: Opsi C</option>
              <option value="3" ${s.answerIndex===3?'selected':''}>Jawaban Benar: Opsi D</option>
            </select>
          </div>
        `).join("");
      }

      async function simpanUjianOnline() {
        const title = document.getElementById("exam-title-input").value.trim();
        const duration = parseInt(document.getElementById("exam-duration-input").value);
        const description = document.getElementById("exam-desc-input").value.trim();
        soalTemporaryFromDOM();

        if(!title || !duration || soalSementara.length === 0) {
          return alert("Judul, durasi paket, dan minimal 1 butir pertanyaan wajib dilengkapi!");
        }

        const payload = {
          title: title,
          description: description,
          duration: duration,
          questions: soalSementara
        };

        try {
          const res = await fetch(`${BASE_API_URL}/api/exams`, {
            method: "POST",
            headers: { 
              "Content-Type": "application/json", 
              "Authorization": `Bearer ${JWT_TOKEN}` 
            },
            body: JSON.stringify(payload)
          });
          const data = await res.json();
          if(data.success) {
            tutupModalUjian();
            fetchExams();
          } else { alert(data.error || "Gagal mengunggah konfigurasi soal."); }
        } catch(e) { alert("Gagal melakukan transmisi data ke infrastruktur Cloudflare."); }
      }

      function mulaiSimulasiUjian(id) {
        const exam = examsData.find(e => e.id === id);
        if(!exam) return;
        let skorSimulasi = Math.round(Math.random() * 40) + 60;
        
        alert(`Sesi ujian "${exam.title}" telah disimulasikan selesai.`);
        resultsData.unshift({
          id: Date.now(),
          title: exam.title,
          score: skorSimulasi,
          date: new Date().toLocaleString('id-ID')
        });
        switchTab('riwayat');
      }

      function renderHistory() {
        const container = document.getElementById("stats-container");
        const list = document.getElementById("history-list");
        if(resultsData.length === 0) {
          container.innerHTML = `<div class="bg-surface-800 border border-slate-800 p-4 rounded-xl text-center text-xs text-slate-500">Belum ada rekam pengerjaan tes lokal.</div>`;
          list.innerHTML = "";
          return;
        }
        container.innerHTML = `
          <div class="bg-surface-800 border border-slate-800 p-4 rounded-xl flex justify-between items-center">
            <span class="text-xs text-slate-400">Total Tes Diikuti</span>
            <span class="text-sm font-bold font-mono text-cyan-400">${resultsData.length}</span>
          </div>
        `;
        list.innerHTML = resultsData.map(r => `
          <div class="bg-surface-800 border border-slate-700/70 p-4 rounded-xl flex justify-between items-center">
            <div>
              <h4 class="text-xs font-bold text-white uppercase">${r.title}</h4>
              <p class="text-[10px] text-slate-500 font-mono mt-1">${r.date}</p>
            </div>
            <span class="text-xs font-bold px-3 py-1 rounded bg-surface-900 font-mono ${r.score >= 75 ? 'text-emerald-400' : 'text-amber-400'}">${r.score} Pts</span>
          </div>
        `).join("");
      }

      function bukaDanBacaArtikel(title, content) {
        alert(`--- ${title} ---\n\n${content}`);
      }

      function bukaModalTambah() { document.getElementById("modal-tulis").classList.remove("hidden"); }
      function tutupModalTambah() { document.getElementById("modal-tulis").classList.add("hidden"); }
      function bukaModalBuatUjian() { soalSementara = []; tambahSoal(); document.getElementById("modal-buat-ujian").classList.remove("hidden"); }
      function tutupModalUjian() { document.getElementById("modal-buat-ujian").classList.add("hidden"); }

      window.onload = function() {
        fetchArticles();
        fetchExams();
      };
    </script>
  </body>
</html>
